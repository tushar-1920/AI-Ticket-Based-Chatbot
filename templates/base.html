<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Ticket System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {

    font-family: Poppins;
    transition: 0.3s;
}

.light-mode {

    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

.dark-mode {

    background: #0f172a;
    color: white;
}

.glass {

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 15px;
}

.navbar {

    background: rgba(0,0,0,0.2);
}

.chat-container {

    max-width: 600px;
    margin: auto;
}

</style>

</head>

<body class="light-mode" id="body">

<nav class="navbar navbar-expand-lg navbar-dark glass">

<div class="container">

<a class="navbar-brand">🤖 AI Support System</a>

<div>

<a href="/chat" class="btn btn-light btn-sm">Chat</a>

<a href="/analytics" class="btn btn-success btn-sm">
Analytics
</a>

<a href="/my-tickets" class="btn btn-info btn-sm">My Tickets</a>

<a href="/admin/dashboard" class="btn btn-warning btn-sm">Admin</a>

<button onclick="toggleMode()" class="btn btn-dark btn-sm">

🌙 Dark Mode

</button>

<a href="/logout" class="btn btn-danger btn-sm">Logout</a>

</div>

</div>

</nav>

<div class="container mt-4">

{% block content %}

{% endblock %}

</div>

<script>

function toggleMode(){

let body = document.getElementById("body");

if(body.classList.contains("light-mode")){

body.classList.remove("light-mode");

body.classList.add("dark-mode");

}else{

body.classList.remove("dark-mode");

body.classList.add("light-mode");

}

}

</script>

</body>

</html>
